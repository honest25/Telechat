<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleGram-Pro V2 | Super App</title>
    <style>
        :root {
            --primary: #2481cc;
            --bg: #ffffff;
            --sidebar-bg: #f4f4f5;
            --text: #1c1c1c;
            --msg-in: #f1f1f1;
            --msg-out: #effdde;
            --border: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
            --danger: #e53935;
        }

        [data-theme="dark"] {
            --bg: #0f0f0f;
            --sidebar-bg: #1a1a1b;
            --text: #e0e0e0;
            --msg-in: #2b2b2b;
            --msg-out: #3d6a97;
            --border: #333333;
            --glass: rgba(15, 15, 15, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* LAYOUT */
        .app-shell {
            display: grid;
            grid-template-columns: 80px 320px 1fr 300px;
            height: 100vh;
            transition: all 0.3s ease;
        }

        /* Nav Rail */
        .nav-rail { background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 20px; }
        .nav-icon { width: 50px; height: 50px; border-radius: 15px; background: var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 20px; }
        .nav-icon:hover, .nav-icon.active { background: var(--primary); color: white; border-radius: 12px; }

        /* Sidebar List */
        .sidebar-list { background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .list-header { padding: 15px; border-bottom: 1px solid var(--border); }
        .search-box { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--sidebar-bg); color: var(--text); }
        .chat-scroll { flex: 1; overflow-y: auto; }
        .chat-card { padding: 12px 15px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .chat-card:hover { background: var(--sidebar-bg); }
        .chat-card.active { background: #e3f2fd; }
        [data-theme="dark"] .chat-card.active { background: #1a2733; }

        .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(45deg, #2481cc, #0088cc); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; position: relative; }
        .status-dot { width: 12px; height: 12px; border: 2px solid var(--bg); background: #4caf50; border-radius: 50%; position: absolute; bottom: 2px; right: 2px; }

        /* Main Stage */
        .main-stage { display: flex; flex-direction: column; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; }
        .chat-header { background: var(--glass); backdrop-filter: blur(10px); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); z-index: 10; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 65%; padding: 10px 14px; border-radius: 18px; font-size: 14px; position: relative; box-shadow: var(--shadow); animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } }
        .m-in { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 4px; }
        .m-out { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 4px; }

        .input-bar { background: var(--bg); padding: 10px 20px; display: flex; align-items: center; gap: 15px; border-top: 1px solid var(--border); }
        .input-field { flex: 1; padding: 12px; border-radius: 25px; border: none; background: var(--sidebar-bg); color: var(--text); outline: none; }

        /* Right Panel (Group Info) */
        .info-panel { background: var(--bg); border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .member-list { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .member-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; background: var(--sidebar-bg); border-radius: 8px; }
        .admin-badge { background: var(--primary); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
        
        /* UI Helpers */
        .hidden { display: none !important; }
        .btn-round { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; background: transparent; font-size: 20px; color: var(--primary); }
        .btn-round:hover { background: var(--sidebar-bg); }
        .btn-action { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-danger { background: var(--danger); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        /* Call Modal */
        #call-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; gap: 20px; }
        video { width: 100%; max-width: 600px; border-radius: 15px; background: #222; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body data-theme="dark">

<div class="app-shell" id="appShell">
    <nav class="nav-rail">
        <div class="nav-icon active" title="Chats">💬</div>
        <div class="nav-icon" onclick="toggleTheme()" title="Dark Mode">🌓</div>
    </nav>

    <aside class="sidebar-list">
        <div class="list-header">
            <h3>TeleGram-Pro</h3>
            <input type="text" class="search-box" placeholder="Search...">
        </div>
        <div class="chat-scroll" id="chatList"></div>
    </aside>

    <main class="main-stage">
        <header class="chat-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="avatar" id="headerAvatar">?</div>
                <div>
                    <strong id="headerName">Select a Chat</strong>
                    <div style="font-size: 12px; color: #4caf50;" id="headerStatus">Online</div>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-round" onclick="startVideoCall()">📹</button>
                <button class="btn-round" onclick="alert('Searching...')">🔍</button>
            </div>
        </header>

        <div class="messages-container" id="msgContainer"></div>

        <div class="input-bar">
            <button class="btn-round">📎</button>
            <input type="text" id="mainInput" class="input-field" placeholder="Message...">
            <button class="btn-round" id="sendBtn" style="color: var(--primary); font-weight: bold;">➤</button>
        </div>
    </main>

    <section class="info-panel" id="infoPanel">
        <div style="text-align: center;">
            <div class="avatar" style="width: 80px; height: 80px; font-size: 28px; margin: 0 auto 10px;">?</div>
            <h2 id="infoName">User/Group Name</h2>
            <p style="color: var(--primary); font-size: 13px;" id="infoBio">Bio or status</p>
        </div>
        
        <div id="groupControls" class="hidden">
            <hr style="border: 0.5px solid var(--border); margin: 20px 0;">
            <h4>Group Members</h4>
            <div class="member-list" id="memberList">
                </div>
            <button class="btn-action hidden" id="adminSettingsBtn">⚙️ Manage Group (Admin Only)</button>
        </div>
    </section>
</div>

<div id="call-modal" class="hidden">
    <h2>Secure Video Call</h2>
    <video id="localVideo" autoplay playsinline muted></video>
    <div style="display: flex; gap: 20px; margin-top: 20px;">
        <button onclick="endCall()" style="background: var(--danger); border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer; color: white;">📞</button>
    </div>
</div>

<script>
    /* --- STATE MANAGEMENT & MOCK DATABASE --- */
    const state = {
        me: { id: 0, name: "Master Admin" },
        activeChatId: null,
        localMediaStream: null, // Holds the webcam feed
        chats: [
            { id: 1, name: "AI Assistant", avatar: "AI", type: "bot", status: "online", bio: "Autonomous assistant" },
            { 
                id: 2, 
                name: "Crypto Alpha Group", 
                avatar: "CA", 
                type: "group", 
                status: "3 members", 
                bio: "Main discussion group",
                role: "admin", // <--- ADMIN PERMISSION SET HERE
                members: [
                    { id: 0, name: "You", role: "admin" },
                    { id: 101, name: "Alice Hacker", role: "member" },
                    { id: 102, name: "Bob Node", role: "member" }
                ]
            },
            { 
                id: 3, 
                name: "Sarah Miller", 
                avatar: "SM", 
                type: "contact", 
                status: "last seen recently", 
                bio: "Frontend Developer",
                role: "member" 
            }
        ]
    };

    /* --- INITIALIZATION --- */
    function init() {
        renderChatList();
        selectChat(2); // Auto-open the group chat to show off features
        
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('mainInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    }

    /* --- UI RENDERING --- */
    function renderChatList() {
        const list = document.getElementById('chatList');
        list.innerHTML = state.chats.map(chat => `
            <div class="chat-card ${state.activeChatId === chat.id ? 'active' : ''}" onclick="selectChat(${chat.id})">
                <div class="avatar">${chat.avatar}</div>
                <div style="flex: 1; overflow: hidden;">
                    <strong>${chat.name}</strong>
                    <div style="font-size: 13px; color: #888;">Tap to open chat</div>
                </div>
            </div>
        `).join('');
    }

    function selectChat(id) {
        state.activeChatId = id;
        const chat = state.chats.find(c => c.id === id);
        
        // Update Headers
        document.getElementById('headerName').innerText = chat.name;
        document.getElementById('headerStatus').innerText = chat.status;
        document.getElementById('headerAvatar').innerText = chat.avatar;
        
        // Update Info Panel
        document.querySelector('.info-panel .avatar').innerText = chat.avatar;
        document.getElementById('infoName').innerText = chat.name;
        document.getElementById('infoBio').innerText = chat.bio;
        
        // Handle Admin/Group Logic
        const groupControls = document.getElementById('groupControls');
        const adminBtn = document.getElementById('adminSettingsBtn');
        const memberList = document.getElementById('memberList');
        
        if (chat.type === 'group') {
            groupControls.classList.remove('hidden');
            const isAdmin = chat.role === 'admin';
            
            // Show manage button if admin
            if (isAdmin) adminBtn.classList.remove('hidden');
            else adminBtn.classList.add('hidden');

            // Render members and conditional "Kick" buttons
            memberList.innerHTML = chat.members.map(m => `
                <div class="member-item">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div class="avatar" style="width:30px; height:30px; font-size:12px;">${m.name.charAt(0)}</div>
                        <span style="font-size: 14px;">${m.name}</span>
                        ${m.role === 'admin' ? '<span class="admin-badge">Admin</span>' : ''}
                    </div>
                    ${(isAdmin && m.id !== 0) ? `<button class="btn-danger" onclick="kickMember(${chat.id}, ${m.id})">Kick</button>` : ''}
                </div>
            `).join('');
        } else {
            groupControls.classList.add('hidden');
        }

        renderChatList();
        loadMessages();
    }

    /* --- PERMISSION LOGIC --- */
    function kickMember(chatId, memberId) {
        const chat = state.chats.find(c => c.id === chatId);
        if (chat.role !== 'admin') {
            alert("Error: You do not have permission to do this.");
            return;
        }
        
        if (confirm("Are you sure you want to remove this user from the group?")) {
            chat.members = chat.members.filter(m => m.id !== memberId);
            chat.status = `${chat.members.length} members`;
            selectChat(chatId); // Re-render UI
            
            // System message
            appendMessageUI(false, "<i>An admin removed a member.</i>", "System");
        }
    }

    /* --- MESSAGING --- */
    function loadMessages() {
        document.getElementById('msgContainer').innerHTML = `<div style="text-align: center; color: #888; font-size: 12px; margin: 10px 0;">Chat started today</div>`;
    }

    function appendMessageUI(isOut, text, time) {
        const container = document.getElementById('msgContainer');
        const div = document.createElement('div');
        div.className = `message ${isOut ? 'm-out' : 'm-in'}`;
        div.innerHTML = `${text} <div style="font-size: 10px; text-align: right; opacity: 0.6;">${time}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('mainInput');
        if(!input.value.trim()) return;
        appendMessageUI(true, input.value, new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
        input.value = '';
    }

    /* --- REAL WEBRTC VIDEO INTEGRATION --- */
    async function startVideoCall() {
        const modal = document.getElementById('call-modal');
        const videoElement = document.getElementById('localVideo');
        
        modal.classList.remove('hidden');
        
        try {
            // Access the user's actual webcam and microphone
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            videoElement.srcObject = stream;
            state.localMediaStream = stream;
        } catch (error) {
            console.error("Error accessing media devices.", error);
            alert("Unable to access camera. Please ensure you have granted permissions.");
            endCall(); // Cleanly close if it fails
        }
    }

    function endCall() {
        document.getElementById('call-modal').classList.add('hidden');
        
        // Stop all media tracks to turn off the camera light
        if (state.localMediaStream) {
            state.localMediaStream.getTracks().forEach(track => track.stop());
            state.localMediaStream = null;
            document.getElementById('localVideo').srcObject = null;
        }
    }

    function toggleTheme() {
        const body = document.body;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    window.onload = init;
</script>
</body>
</html>
